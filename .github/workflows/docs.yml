name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build DocC
    runs-on: macos-26
    env:
      PRINTABLEVIEW_BUILD_DOCS: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate documentation
        run: |
          swift package --allow-writing-to-directory docs \
            generate-documentation \
            --target PrintableView \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path PrintableView \
            --output-path docs

      - name: Add root redirect to the documentation landing page
        run: |
          printf '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=documentation/printableview/"></head></html>' > docs/index.html
